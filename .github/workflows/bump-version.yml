name: Bump Version
on:
  push:
    branches:
      - main

jobs:
  bump:
    # 1. Skip if the commit message contains [skip ci] (Standard GitHub protection)
    # 2. Skip if the commit message starts with 'chore:' (Our convention for bot commits)
    # 3. Skip if the actor is the github-actions bot
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') && 
      !startsWith(github.event.head_commit.message, 'chore:') && 
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Using PAT allows the pushed tag to trigger the Release workflow
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # If PAT exists, update remote to use it for the push
          if [ -n "${{ secrets.PERSONAL_ACCESS_TOKEN }}" ]; then
            git remote set-url origin https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git
          fi

      - name: Manual Bump Version
        id: bump
        run: |
          # Read current version
          CURRENT_VERSION=$(cat VERSION)
          echo "Current version detected: $CURRENT_VERSION"
          
          # Increment patch version (e.g. 1.0.7 -> 1.0.8)
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          echo "New version calculated: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Update all manifest files
          echo "$NEW_VERSION" > VERSION
          sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/g" package.json
          sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/g" src-tauri/tauri.conf.json
          sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/g" src-tauri/Cargo.toml
          
          # Update .bumpversion.cfg current_version
          sed -i "s/current_version = $CURRENT_VERSION/current_version = $NEW_VERSION/g" .bumpversion.cfg

      - name: Commit and Push changes
        run: |
          NEW_VERSION=${{ steps.bump.outputs.version }}
          git add VERSION package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml .bumpversion.cfg
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin main
          
      - name: Create and Push Tag
        run: |
          NEW_VERSION=${{ steps.bump.outputs.version }}
          # Separating the tag push from the commit push ensures it triggers other workflows
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
