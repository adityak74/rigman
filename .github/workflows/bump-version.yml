name: Bump Version
on:
  push:
    branches:
      - main

jobs:
  bump:
    # Strict check: only run if NOT a chore commit and NOT from the bot
    if: "!startsWith(github.event.head_commit.message, 'chore:') && github.actor != 'github-actions[bot]'"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install bump2version
        run: pip install bump2version

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          # Use [skip ci] in the commit message to prevent loops
          bump2version patch --allow-dirty --verbose --commit-args="--message 'chore: bump version to {new_version} [skip ci]'"
          git push origin main
          git push origin --tags
